apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
data:
  APP_ENV: "production"
  LOG_LEVEL: "warn"
  PORT: "8080"
  DB_HOST: "k8s-training-prod-postgres.xxxxx.us-east-1.rds.amazonaws.com"
  DB_NAME: "appdb"
  CACHE_TTL_SECONDS: "300"
  RATE_LIMIT_RPS: "2000"
  CORS_ORIGINS: "https://app.example.com"
